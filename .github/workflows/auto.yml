name: Greenie

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Make change
        run: |
          echo "update $(date)" >> log.txt

      - name: Commit
        run: |
          git config --global user.name "acerijan"
          git config --global user.email "rijandai147@gmail.com"
          git add .
          git commit -m "auto update" || echo "no changes"

      - name: Push
        run: git push
